name: E2E (Splash - Docker)

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true
        default: 'python'

jobs:
  splash-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check Docker available
        run: |
          pip install requests beautifulsoup4
          docker --version
          docker ps

      - name: Start Splash container
        run: |
          docker run -d --name splash -p 8050:8050 scrapinghub/splash
          sleep 15
          docker ps

      - name: Verify Splash
        run: |
          curl -s http://localhost:8050 | head -c 200 || echo "Splash not ready yet"

      - name: Test Splash rendering
        env:
          QUERY: ${{ github.event.inputs.query }}
        run: |
          python3 << 'PYEOF'
          import requests
          from bs4 import BeautifulSoup

          splash_url = "http://localhost:8050"
          query = "${{ env.QUERY }}"
          if not query:
              query = "python"

          print("=== Splash in Docker Evaluation ===")
          print(f"Query: {query}")

          # Test 1: Basic connectivity
          r = requests.get(f"{splash_url}/render.html?url=https://example.com&wait=2", timeout=30)
          print(f"Splash connectivity: {r.status_code}")

          # Test 2: Render search results with Lua for better rendering
          search_url = f"https://taiwanlibrarysearch.herokuapp.com/result?book={query}"
          print(f"URL: {search_url}")

          lua_script = """
          function main(splash, args)
              splash:go(args.url)
              splash:wait(8)
              return {
                  html = splash:html(),
                  url = splash:url()
              }
          end
          """

          r = requests.get(
              f"{splash_url}/execute",
              params={"lua_source": lua_script, "url": search_url},
              timeout=120
          )
          print(f"Status: {r.status_code}, Content: {len(r.text)} bytes")

          blocks = []
          items = []

          if r.status_code == 200:
              try:
                  data = r.json()
                  html = data.get('html', '')
                  soup = BeautifulSoup(html, 'html.parser')
                  blocks = soup.select('.content-block')
                  items = soup.select('.items-body-content a, .accordion')
                  print(f"Content blocks: {len(blocks)}")
                  print(f"Items: {len(items)}")
              except Exception as e:
                  print(f"Parse error: {e}")
          else:
              print(f"Error: {r.text[:200]}")

          # If still no blocks, try plain render with longer wait
          if len(blocks) == 0:
              print("Trying plain render.html with longer wait...")
              r = requests.get(
                  f"{splash_url}/render.html",
                  params={"url": search_url, "wait": 10, "images": 0},
                  timeout=120
              )
              print(f"Plain render status: {r.status_code}")
              soup = BeautifulSoup(r.text, 'html.parser')
              blocks = soup.select('.content-block')
              items = soup.select('.items-body-content a, .accordion')
              print(f"Plain render blocks: {len(blocks)}")
              print(f"Plain render items: {len(items)}")

              # Debug: check if page has any content at all
              print(f"DEBUG: Page has {len(r.text)} chars, looking for 'content' class...")
              print(f"DEBUG: All divs with class containing 'content': {len(soup.select('[class*=\"content\"]'))}")
              print(f"DEBUG: All divs: {len(soup.select('div'))}")
              print(f"DEBUG: Body text sample: {soup.body.get_text()[:200] if soup.body else 'No body'}")

              # Check for script tags - what JS is the page using?
              scripts = soup.select('script')
              print(f"DEBUG: Script tags: {len(scripts)}")
              if scripts:
                  srcs = [s.get('src') or 'inline' for s in scripts[:5]]
                  print(f"DEBUG: Script sources: {srcs}")

              # Check for noscript or anti-bot messages
              noscript = soup.select('noscript')
              print(f"DEBUG: Noscript tags: {len(noscript)}")

              # Show actual HTML structure
              print(f"DEBUG: Full HTML: {r.text[:1000]}")

          PLATFORMS = {1: "HyRead", 2: "UDN", 3: "國立公共資訊圖書館", 4: "台灣雲端書庫"}
          results = {pid: 0 for pid in PLATFORMS}
          for block in blocks:
              text = block.get_text()
              for pid, name in PLATFORMS.items():
                  if name in text:
                      results[pid] += 1

          print("\n=== Results by Platform ===")
          for pid, name in PLATFORMS.items():
              print(f"  {name}: {results[pid]} blocks")

          platforms = sum(1 for v in results.values() if v > 0)
          print(f"\n=== Acceptance ===")
          print(f"Platforms: {platforms}/4, Items: {len(items)}")

          if platforms >= 3 and len(items) >= 10:
              print("PASS: >=3 platforms, >=10 items")
          else:
              print("NEEDS INVESTIGATION")
          PYEOF

      - name: Cleanup
        if: always()
        run: docker stop splash 2>/dev/null || docker rm splash 2>/dev/null || true