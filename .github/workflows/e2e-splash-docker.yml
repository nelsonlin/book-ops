name: E2E (Splash - Docker)

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true
        default: 'python'

jobs:
  splash-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check Docker available
        run: |
          pip install requests beautifulsoup4
          docker --version
          docker ps

      - name: Start Splash container
        run: |
          docker run -d --name splash -p 8050:8050 scrapinghub/splash
          sleep 15
          docker ps

      - name: Verify Splash
        run: |
          curl -s http://localhost:8050 | head -c 200 || echo "Splash not ready yet"

      - name: Test Splash rendering
        env:
          QUERY: ${{ github.event.inputs.query }}
        run: |
          python3 << 'PYEOF'
          import requests
          from bs4 import BeautifulSoup

          splash_url = "http://localhost:8050"
          query = "${{ env.QUERY }}"
          if not query:
              query = "python"

          print("=== Splash in Docker Evaluation ===")
          print(f"Query: {query}")

          # Test 1: Basic connectivity
          r = requests.get(f"{splash_url}/render.html?url=https://example.com&wait=2", timeout=30)
          print(f"Splash connectivity: {r.status_code}")

          # Test 2: Render search results
          search_url = f"https://taiwanlibrarysearch.herokuapp.com/result?book={query}"
          print(f"URL: {search_url}")

          r = requests.get(
              f"{splash_url}/render.html",
              params={"url": search_url, "wait": 4, "images": 0},
              timeout=90
          )
          print(f"Status: {r.status_code}, Content: {len(r.text)} bytes")

          # Debug: print first 500 chars of HTML
          if len(blocks) == 0:
              print(f"DEBUG HTML preview: {r.text[:500]}")

          # If no blocks, try with Lua script for more wait time
          if len(blocks) == 0:
              print("Trying with Lua script for better rendering...")
              lua_script = """
              function main(splash, args)
                  splash:go(args.url)
                  splash:wait(8)
                  return {{
                      html = splash:html(),
                      url = splash:url()
                  }}
              end
              """
              r = requests.get(
                  f"{splash_url}/execute",
                  params={"lua_source": lua_script, "url": search_url},
                  timeout=120
              )
              print(f"Lua status: {r.status_code}, Content: {len(r.text)} bytes")

              if r.status_code == 200:
                  try:
                      data = r.json()
                      html = data.get('html', '')
                      soup = BeautifulSoup(html, 'html.parser')
                      blocks = soup.select('.content-block')
                      items = soup.select('.items-body-content a, .accordion')
                      print(f"Lua Content blocks: {len(blocks)}")
                      print(f"Lua Items: {len(items)}")
                  except Exception as e:
                      print(f"Lua parse error: {e}")

          PLATFORMS = {1: "HyRead", 2: "UDN", 3: "國立公共資訊圖書館", 4: "台灣雲端書庫"}
          results = {pid: 0 for pid in PLATFORMS}
          for block in blocks:
              text = block.get_text()
              for pid, name in PLATFORMS.items():
                  if name in text:
                      results[pid] += 1

          print("\n=== Results by Platform ===")
          for pid, name in PLATFORMS.items():
              print(f"  {name}: {results[pid]} blocks")

          platforms = sum(1 for v in results.values() if v > 0)
          print(f"\n=== Acceptance ===")
          print(f"Platforms: {platforms}/4, Items: {len(items)}")

          if platforms >= 3 and len(items) >= 10:
              print("PASS: >=3 platforms, >=10 items")
          else:
              print("NEEDS INVESTIGATION")
          PYEOF

      - name: Cleanup
        if: always()
        run: docker stop splash 2>/dev/null || docker rm splash 2>/dev/null || true