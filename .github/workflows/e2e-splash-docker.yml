name: E2E (Splash - Docker)

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'Search query'
        required: true
        default: 'python'

jobs:
  splash-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check Docker available
        run: |
          pip install requests beautifulsoup4
          docker --version
          docker ps

      - name: Start Splash container
        run: |
          # Use health check instead of fixed sleep
          docker run -d --name splash -p 8050:8050 scrapinghub/splash:3.5
          for i in {1..30}; do
            if curl -s http://localhost:8050 > /dev/null 2>&1; then
              echo "Splash ready after $i seconds"
              break
            fi
            sleep 1
          done
          docker ps

      - name: Verify Splash
        run: |
          curl -s http://localhost:8050 | head -c 200 || echo "Splash not ready yet"

      - name: Test Splash rendering
        env:
          QUERY: ${{ github.event.inputs.query }}
        run: |
          python3 << 'PYEOF'
          import requests
          from bs4 import BeautifulSoup

          splash_url = "http://localhost:8050"
          query = "${{ env.QUERY }}"
          if not query:
              query = "python"

          print("=== Splash in Docker Evaluation ===")
          print(f"Query: {query}")

          # Test 1: Basic connectivity
          r = requests.get(f"{splash_url}/render.html?url=https://example.com&wait=2", timeout=30)
          print(f"Splash connectivity: {r.status_code}")

          # Test 2: Render search results with Lua for better rendering
          search_url = f"https://taiwanlibrarysearch.herokuapp.com/result?book={query}"
          print(f"URL: {search_url}")

          lua_script = """
          function main(splash, args)
              -- Fix #2: Use set_user_agent instead of replacing all headers
              splash:set_user_agent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36")
              
              -- Fix #3: Set viewport to match real desktop browser
              splash:set_viewport_size(1366, 768)
              
              -- Fix #2: Add Chrome client hints via on_request
              splash:on_request(function(request)
                  request:set_header("Accept", "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8")
                  request:set_header("Accept-Language", "zh-TW,zh;q=0.9,en-US;q=0.8,en;q=0.7")
                  request:set_header("Accept-Encoding", "gzip, deflate, br")
                  request:set_header("Referer", "https://taiwanlibrarysearch.herokuapp.com/")
                  request:set_header("sec-ch-ua", "\"Chromium\";v=\"120\", \"Google Chrome\";v=\"120\", \"Not_A Brand\";v=\"24\"")
                  request:set_header("sec-ch-ua-mobile", "?0")
                  request:set_header("sec-ch-ua-platform", "\"Windows\"")
                  request:set_header("sec-fetch-dest", "document")
                  request:set_header("sec-fetch-mode", "navigate")
                  request:set_header("sec-fetch-site", "none")
                  request:set_header("sec-fetch-user", "?1")
                  request:set_header("Upgrade-Insecure-Requests", "1")
              end)
              
              splash:go(args.url)
              
              -- Fix #4: Double wait for async content
              splash:wait(5)
              
              -- Trigger scroll to load lazy content
              splash:runjs("window.scrollTo(0, document.body.scrollHeight)")
              splash:wait(5)
              
              return {
                  html = splash:html(),
                  url = splash:url()
              }
          end
          """

          r = requests.get(
              f"{splash_url}/execute",
              params={"lua_source": lua_script, "url": search_url},
              timeout=120
          )
          print(f"Status: {r.status_code}, Content: {len(r.text)} bytes")

          blocks = []
          items = []

          if r.status_code == 200:
              try:
                  data = r.json()
                  html = data.get('html', '')
                  soup = BeautifulSoup(html, 'html.parser')
                  blocks = soup.select('.content-block')
                  items = soup.select('.items-body-content a, .accordion')
                  print(f"Content blocks: {len(blocks)}")
                  print(f"Items: {len(items)}")
                  
                  # Check for JS required message in Lua result
                  html_lower = html.lower()
                  if "enable javascript" in html_lower or "javascript is required" in html_lower:
                      print("DETECTED: Site requires JavaScript!")
              except Exception as e:
                  print(f"Parse error: {e}")
          else:
              print(f"Error: {r.text[:200]}")

          # If still no blocks, try plain render with longer wait (Fix #4)
          if len(blocks) == 0:
              print("Trying plain render.html with longer wait (12s)...")
              r = requests.get(
                  f"{splash_url}/render.html",
                  params={"url": search_url, "wait": 12, "images": 0},
                  timeout=120
              )
              print(f"Plain render status: {r.status_code}")
              soup = BeautifulSoup(r.text, 'html.parser')
              blocks = soup.select('.content-block')
              items = soup.select('.items-body-content a, .accordion')
              print(f"Plain render blocks: {len(blocks)}")
              print(f"Plain render items: {len(items)}")

              # Debug: check if page has any content at all
              print(f"DEBUG: Page has {len(r.text)} chars, looking for 'content' class...")
              
              # Check for anti-bot / JS required messages
              html_lower = r.text.lower()
              js_messages = [
                  "you need to enable javascript",
                  "javascript is required",
                  "enable javascript",
                  "javascript is disabled"
              ]
              for msg in js_messages:
                  if msg in html_lower:
                      print(f"DETECTED: '{msg}' message found!")
              
              print(f"DEBUG: All divs with class containing 'content': {len(soup.select('[class*=\"content\"]'))}")
              print(f"DEBUG: All divs: {len(soup.select('div'))}")
              print(f"DEBUG: Body text sample: {soup.body.get_text()[:200] if soup.body else 'No body'}")

              # Check for script tags - what JS is the page using?
              scripts = soup.select('script')
              print(f"DEBUG: Script tags: {len(scripts)}")
              if scripts:
                  srcs = [s.get('src') or 'inline' for s in scripts[:5]]
                  print(f"DEBUG: Script sources: {srcs}")

              # Check for noscript or anti-bot messages
              noscript = soup.select('noscript')
              print(f"DEBUG: Noscript tags: {len(noscript)}")
              if noscript:
                  for i, ns in enumerate(noscript[:3]):
                      ns_text = ns.get_text().strip()
                      if ns_text:
                          print(f"DEBUG: Noscript[{i}] text: {ns_text[:100]}")

              # Show actual HTML structure
              print(f"DEBUG: Full HTML: {r.text[:1000]}")

              # Try base URL first to see if homepage works
              print("\n=== Test: Homepage ===")
              r_home = requests.get(
                  f"{splash_url}/render.html",
                  params={"url": "https://taiwanlibrarysearch.herokuapp.com/", "wait": 8},
                  timeout=120
              )
              print(f"Homepage status: {r_home.status_code}")
              soup_home = BeautifulSoup(r_home.text, 'html.parser')
              home_divs = soup_home.select('div')
              print(f"Homepage divs: {len(home_divs)}")
              print(f"Homepage body text: {soup_home.body.get_text()[:100] if soup_home.body else 'No body'}")

          PLATFORMS = {1: "HyRead", 2: "UDN", 3: "國立公共資訊圖書館", 4: "台灣雲端書庫"}
          results = {pid: 0 for pid in PLATFORMS}
          for block in blocks:
              text = block.get_text()
              for pid, name in PLATFORMS.items():
                  if name in text:
                      results[pid] += 1

          print("\n=== Results by Platform ===")
          for pid, name in PLATFORMS.items():
              print(f"  {name}: {results[pid]} blocks")

          platforms = sum(1 for v in results.values() if v > 0)
          print(f"\n=== Acceptance ===")
          print(f"Platforms: {platforms}/4, Items: {len(items)}")

          if platforms >= 3 and len(items) >= 10:
              print("PASS: >=3 platforms, >=10 items")
          else:
              print("NEEDS INVESTIGATION")
          PYEOF

      - name: Cleanup
        if: always()
        run: docker stop splash 2>/dev/null || docker rm splash 2>/dev/null || true